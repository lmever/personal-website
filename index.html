<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Website · Development entry</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #fbfaf7;
        color: #111;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.6;
      }

      main {
        width: min(680px, calc(100% - 2rem));
        border: 1px solid #dedbd2;
        border-radius: 18px;
        background: #fff;
        padding: 2rem;
      }

      code {
        border-radius: 0.35rem;
        background: #e7eee9;
        padding: 0.15rem 0.35rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Run the Astro site first</h1>
      <p>This file is only a helper page. The actual website is generated from <code>src/pages/</code>.</p>
      <p>Open a terminal in this folder and run <code>dev.cmd</code>, then use the localhost URL printed by Astro.</p>
    </main>
  </body>
</html>
